<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页截图工具 📸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 2em; }
        .subtitle { color: #666; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }
        button:hover { transform: translateY(-2px); }
        .tips { 
            background: #f0f4ff; 
            border-radius: 10px; 
            padding: 15px; 
            font-size: 13px; 
            color: #555;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 网页截图工具</h1>
        <p class="subtitle">基于 Thum.io 服务</p>

        <input type="text" id="urlInput" placeholder="输入网址，例如: example.com" />
        <button onclick="openScreenshot()">生成截图链接</button>

        <div class="tips">
            <strong>💡 使用方法：</strong><br>
            1. 输入要截图的网址<br>
            2. 点击"生成截图链接"<br>
            3. 跳转后右键图片"另存为"保存
        </div>
    </div>

    <script>
        function openScreenshot() {
            let url = document.getElementById('urlInput').value.trim();
            if (!url) { alert('请输入网址'); return; }
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            // 直接跳转到 thum.io
            window.location.href = 'https://thum.io/' + url;
        }
        
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') openScreenshot();
        });
    </script>
</body>
</html>
