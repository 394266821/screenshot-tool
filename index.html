<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页截图工具 📸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .preview-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f9f9f9;
            overflow: auto;
        }

        .preview-area.empty {
            color: #999;
            font-size: 16px;
        }

        .preview-area img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .loading {
            display: none;
            text-align: center;
            color: #666;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .download-btn {
            display: none;
            margin: 20px auto 0;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .download-btn.active {
            display: block;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
            padding: 15px;
            background: #ffeaea;
            border-radius: 10px;
        }

        .error.active {
            display: block;
        }

        .tips {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }

        .tips strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 网页截图工具</h1>
        <p class="subtitle">基于 Playwright 技术，支持截取任意网站</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="请输入网页URL (例如: example.com)" />
            <button id="captureBtn">截取屏幕</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在截取网页，请稍候...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="preview-area empty" id="previewArea">
            截图预览区
        </div>

        <button class="download-btn" id="downloadBtn">💾 下载图片</button>

        <div class="tips">
            <strong>💡 提示：</strong>基于 Playwright 服务端截图，支持截取任意网站！
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const captureBtn = document.getElementById('captureBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const previewArea = document.getElementById('previewArea');
        const downloadBtn = document.getElementById('downloadBtn');

        let capturedImage = null;

        // 获取 API 地址（本地开发用 /api/screenshot，生产用当前域名）
        const API_URL = '/api/screenshot';

        // 测试 5: 输入验证
        captureBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            
            if (!url) {
                showError('请输入有效的网址');
                return;
            }

            let finalUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                finalUrl = 'https://' + url;
            }

            try {
                new URL(finalUrl);
            } catch (e) {
                showError('请输入有效的网址格式');
                return;
            }

            await captureScreenshot(finalUrl);
        });

        // 测试 6: 截图功能
        async function captureScreenshot(url) {
            showLoading(true);
            hideError();
            previewArea.innerHTML = '截图预览区';
            previewArea.classList.add('empty');
            downloadBtn.classList.remove('active');
            capturedImage = null;

            captureBtn.disabled = true;

            try {
                // 调用服务端 API
                const response = await fetch(`${API_URL}?url=${encodeURIComponent(url)}`, {
                    signal: AbortSignal.timeout(30000)
                });
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || '截图失败');
                }
                
                const blob = await response.blob();
                capturedImage = URL.createObjectURL(blob);
                showPreview(capturedImage);
                
            } catch (err) {
                showError('截图失败: ' + err.message);
            } finally {
                showLoading(false);
                captureBtn.disabled = false;
            }
        }

        // 测试 7: 预览功能
        function showPreview(imageData) {
            previewArea.innerHTML = `<img src="${imageData}" alt="截图预览" />`;
            previewArea.classList.remove('empty');
            downloadBtn.classList.add('active');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('active');
        }

        function hideError() {
            error.classList.remove('active');
        }

        function showLoading(show) {
            loading.classList.toggle('active', show);
        }

        // 测试 8: 下载功能
        downloadBtn.addEventListener('click', () => {
            if (!capturedImage) return;

            const link = document.createElement('a');
            link.download = `screenshot-${Date.now()}.png`;
            link.href = capturedImage;
            link.click();
        });

        // 支持回车键
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                captureBtn.click();
            }
        });
    </script>
</body>
</html>
